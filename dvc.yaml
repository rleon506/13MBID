stages:
  data_visualization:
    cmd: python src/data_visualization.py
    deps:
      - src/data_visualization.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - docs/figures/target_distribution.png
      - docs/figures/correlation_heatmap_creditos.png
      - docs/figures/correlation_heatmap_tarjetas.png
      - docs/figures/boxplot_importe_falta_pago.png
      - docs/figures/boxplot_limite_nivel_tarjeta.png
      - docs/reporte_creditos.html
      - docs/reporte_tarjetas.html
 
  test_pandera:
    cmd: powershell -Command "pytest --html=docs/report_basico.html --self-contained-html test/test_data_quality.py -v; exit 0"
    deps:
    - data/raw/datos_creditos.csv
    - data/raw/datos_tarjetas.csv
    - test/test_data_quality.py
    outs:
    - docs/report_basico.html

  test_ge:
    cmd: powershell -Command "pytest --html=docs/report_ge.html --self-contained-html test/test_data_quality_ge.py -v; exit 0"
    deps:
    - data/raw/datos_creditos.csv
    - data/raw/datos_tarjetas.csv
    - test/test_data_quality_ge.py
    outs:
    - docs/report_ge.html

  data_processing:
    cmd: python src/data_prep.py
    deps:
      - src/data_prep.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - data/processed/datos_integrados.csv